appId: com.codera.ai
productName: Codera AI

directories:
  output: release
  buildResources: build-resources

# Files included in the package
files:
  - dist/**
  - dist-electron/**
  - node_modules/**
  - permission-mcp.cjs
  - package.json

# Native modules (node-pty) must live outside the asar archive
asar: false

mac:
  category: public.app-category.developer-tools
  identity: null
  target:
    - target: zip
      arch: [arm64]
  icon: build-resources/icon.icns

win:
  target:
    - nsis
  icon: build-resources/icon.ico

linux:
  target:
    - AppImage

# Rebuild native modules for Electron (node-pty rebuilt manually via electron:rebuild before this step)
npmRebuild: false
